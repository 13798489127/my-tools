<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🖼️ 图片批量排版工具 · 多图拼版/导出PDF</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            background: #f5f7fb;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app {
            max-width: 1600px;
            width: 100%;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        /* 左侧控制面板 */
        .control-panel {
            flex: 0 0 360px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            padding: 24px 20px;
            height: fit-content;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .panel-title {
            font-weight: 700;
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #e9eef4;
            padding-bottom: 12px;
        }

        .section {
            margin-bottom: 24px;
            background: #fafcff;
            border-radius: 18px;
            padding: 16px 18px;
            border: 1px solid #e6edf4;
        }

        .section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #0b2b4a;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group {
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .input-group label {
            width: 100px;
            font-weight: 500;
            color: #334e68;
            font-size: 0.9rem;
        }

        .input-group input,
        .input-group select {
            flex: 1;
            padding: 8px 12px;
            border: 1.5px solid #d7e0e9;
            border-radius: 14px;
            background: white;
            font-size: 0.9rem;
        }

        .input-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            outline: none;
        }

        .inline-check {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .inline-check label {
            width: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            background: white;
            border: 1.5px solid #cbd5e1;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #1e3a5f;
            border-color: #1e3a5f;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 35, 70, 0.1);
        }

        .btn-primary:hover {
            background: #143048;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        .file-upload-area {
            border: 2px dashed #b9c8dd;
            border-radius: 24px;
            padding: 18px 12px;
            text-align: center;
            background: #f9fcff;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .file-upload-area:hover {
            border-color: #3b82f6;
        }

        #image-count {
            font-weight: 600;
            color: #0b2b4a;
            margin-top: 8px;
        }

        .preview-area {
            flex: 1;
            min-width: 600px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .canvas-wrapper {
            background: #eef2f6;
            border-radius: 20px;
            padding: 16px;
            overflow: auto;
            display: flex;
            justify-content: center;
            flex: 1;
            min-height: 500px;
            border: 1px solid #dee6ed;
        }

        canvas {
            background: white;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            display: block;
            max-width: 100%;
            height: auto;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 18px;
        }

        .page-indicator {
            font-weight: 600;
            color: #1e3a5f;
        }

        .status-tip {
            color: #5f7d9c;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .thumb-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 120px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .thumb-item {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #ccdae8;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
    <!-- 图标库 (仅用于装饰) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="app">
        <!-- 左侧控制区 -->
        <div class="control-panel">
            <div class="panel-title">
                <i class="fas fa-images" style="color:#2563eb;"></i> 排版工坊
            </div>

            <!-- 图片上传 -->
            <div class="section">
                <h3><i class="fas fa-cloud-upload-alt"></i> 批量图片</h3>
                <div class="file-upload-area" id="upload-area">
                    <i class="fas fa-plus-circle" style="font-size: 28px; color:#3b82f6;"></i>
                    <p style="margin: 8px 0 4px; font-weight:500;">点击或拖拽上传</p>
                    <p style="font-size:0.8rem; color:#62778b;">支持多选 (jpg/png/webp)</p>
                    <input type="file" id="file-input" accept="image/*" multiple style="display:none;">
                </div>
                <div id="image-count">📸 已选 0 张图片</div>
                <div class="thumb-list" id="thumb-list"></div>
            </div>

            <!-- 纸张设置 -->
            <div class="section">
                <h3><i class="fas fa-file-alt"></i> 纸张尺寸 (mm)</h3>
                <div class="input-group">
                    <label>预设</label>
                    <select id="paper-preset">
                        <option value="A4" selected>A4 (210x297)</option>
                        <option value="A3">A3 (297x420)</option>
                        <option value="A5">A5 (148x210)</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>宽度</label>
                    <input type="number" id="paper-width" value="210" step="1" min="10" max="2000">
                </div>
                <div class="input-group">
                    <label>高度</label>
                    <input type="number" id="paper-height" value="297" step="1" min="10" max="2000">
                </div>
                <div class="input-group">
                    <label>页边距</label>
                    <input type="number" id="margin" value="0" step="0.5" min="0" max="100">
                </div>
            </div>

            <!-- 布局 & 图片设置 -->
            <div class="section">
                <h3><i class="fas fa-th"></i> 布局</h3>
                <div class="flex-row">
                    <div class="input-group" style="flex:1;">
                        <label>行数</label>
                        <input type="number" id="rows" value="3" min="1" max="20" style="width:100%;">
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label>列数</label>
                        <input type="number" id="cols" value="3" min="1" max="20" style="width:100%;">
                    </div>
                </div>
                <div class="input-group" style="margin-top:12px;">
                    <label>图片间距</label>
                    <input type="number" id="spacing" value="0" step="0.5" min="0">
                    <span style="margin-left:4px;">mm</span>
                </div>
                <div class="inline-check" style="margin: 12px 0;">
                    <label><input type="checkbox" id="auto-fill-mode" checked="true"> 🔄 自动铺满 (忽略下方尺寸)</label>
                </div>
            </div>

            <div class="section">
                <h3><i class="fas fa-expand-alt"></i> 图片尺寸 (mm)</h3>
                <div class="input-group">
                    <label>模式</label>
                    <select id="size-mode">
                        <option value="width" selected>固定宽度</option>
                        <option value="height">固定高度</option>
                        <option value="custom">自定义宽高</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>宽度</label>
                    <input type="number" id="img-width" value="60" step="0.5" min="5">
                </div>
                <div class="input-group">
                    <label>高度</label>
                    <input type="number" id="img-height" value="60" step="0.5" min="5">
                </div>
                <div class="input-group">
                    <label style="margin-left:16px;"><i class="fas fa-undo-alt"></i> 旋转 </label>
                    <input type="number" id="rotation" value="0" step="1" min="-180" max="180" style="width:80px;"> °
                </div>
                <div class="inline-check">
                    <label><input type="checkbox" id="lock-ratio" checked> 🔒 锁定比例</label>
                </div>
                <p class="status-tip" style="margin-top:8px;">* 锁定比例下，改宽/高会自动计算另一值</p>

            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn btn-primary" id="refresh-btn"><i class="fas fa-sync-alt"></i> 刷新预览</button>
                <button class="btn btn-primary" id="export-pdf-btn"><i class="fas fa-file-pdf"></i> 导出PDF</button>
            </div>
            <p style="margin-top: 12px; font-size:0.8rem; color:#4b6589;">⬇️ 点击画布下方翻页，设置后自动重算</p>
        </div>

        <!-- 右侧预览区 -->
        <div class="preview-area">
            <div class="preview-header">
                <h2 style="font-weight:600; font-size:1.4rem; color:#1e293b;">📐 排版预览</h2>
                <span id="page-info" class="page-indicator">第 1 / 1 页</span>
            </div>
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="preview-canvas"></canvas>
            </div>
            <div class="pagination">
                <button class="btn btn-sm" id="prev-page"><i class="fas fa-chevron-left"></i> 上一页</button>
                <span id="current-page-label">1</span> / <span id="total-pages-label">1</span>
                <button class="btn btn-sm" id="next-page">下一页 <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            "use strict";

            // ---------- 全局变量 ----------
            let images = [];               // 存储已加载的Image对象
            let imageFiles = [];           // 原始文件 (用于显示缩略图)
            let currentPage = 0;
            let totalPages = 1;
            let layoutCache = [];          // 每页的排版数据 { items: [{img, x, y, w, h, rotation}] }

            // DOM 元素
            const fileInput = document.getElementById('file-input');
            const uploadArea = document.getElementById('upload-area');
            const imageCountSpan = document.getElementById('image-count');
            const thumbList = document.getElementById('thumb-list');
            const canvas = document.getElementById('preview-canvas');
            const ctx = canvas.getContext('2d');

            // 输入控件
            const paperPreset = document.getElementById('paper-preset');
            const paperWidthInput = document.getElementById('paper-width');
            const paperHeightInput = document.getElementById('paper-height');
            const marginInput = document.getElementById('margin');
            const rowsInput = document.getElementById('rows');
            const colsInput = document.getElementById('cols');
            const spacingInput = document.getElementById('spacing');
            const autoFillCheck = document.getElementById('auto-fill-mode');
            const sizeModeSelect = document.getElementById('size-mode');
            const imgWidthInput = document.getElementById('img-width');
            const imgHeightInput = document.getElementById('img-height');
            const lockRatioCheck = document.getElementById('lock-ratio');
            const rotationInput = document.getElementById('rotation');

            const refreshBtn = document.getElementById('refresh-btn');
            const exportPdfBtn = document.getElementById('export-pdf-btn');
            const prevPageBtn = document.getElementById('prev-page');
            const nextPageBtn = document.getElementById('next-page');
            const currentPageLabel = document.getElementById('current-page-label');
            const totalPagesLabel = document.getElementById('total-pages-label');
            const pageInfoSpan = document.getElementById('page-info');

            // 常量：mm到px转换 (96DPI ≈ 3.7795)
            const MM_TO_PX = 3.779527559;

            // ---------- 辅助函数 ----------
            function mmToPx(mm) {
                return mm * MM_TO_PX;
            }

            // 更新纸张预设
            function updatePaperPreset() {
                const preset = paperPreset.value;
                if (preset === 'A4') { paperWidthInput.value = 210; paperHeightInput.value = 297; }
                else if (preset === 'A3') { paperWidthInput.value = 297; paperHeightInput.value = 420; }
                else if (preset === 'A5') { paperWidthInput.value = 148; paperHeightInput.value = 210; }
                // custom 不做变动
            }
            paperPreset.addEventListener('change', updatePaperPreset);

            // 锁定比例逻辑：当修改宽度或高度时，根据另一值及原始比例调整
            let lastImgNaturalRatio = 1; // 默认1，后续会基于第一张图更新？但最好基于当前选中的？简化：用全局锁定计算，基于当前输入比例。更合理：如果锁定，修改宽时按当前高/宽比调整高，反之亦然。但我们需要一个基准比例。我们存储一个内部比例，取自第一张图片？但图片比例各不相同。为了统一排版，我们使用手动输入比例。当锁定且修改宽度，高度 = 宽度 / 当前比例；修改高度，宽度 = 高度 * 当前比例。比例从当前宽高计算。我们实现：
            function updateRatioLock(changed) {
                if (!lockRatioCheck.checked) return;
                const w = parseFloat(imgWidthInput.value) || 60;
                const h = parseFloat(imgHeightInput.value) || 60;
                if (changed === 'width') {
                    const ratio = w / h;
                    if (isFinite(ratio)) imgHeightInput.value = (w / ratio).toFixed(2);
                } else if (changed === 'height') {
                    const ratio = w / h;
                    if (isFinite(ratio)) imgWidthInput.value = (h * ratio).toFixed(2);
                }
            }

            imgWidthInput.addEventListener('input', () => updateRatioLock('width'));
            imgHeightInput.addEventListener('input', () => updateRatioLock('height'));

            // 尺寸模式影响输入框状态
            function updateSizeModeUI() {
                const mode = sizeModeSelect.value;
                if (mode === 'width') {
                    imgHeightInput.disabled = true;
                    imgWidthInput.disabled = false;
                } else if (mode === 'height') {
                    imgWidthInput.disabled = true;
                    imgHeightInput.disabled = false;
                } else {
                    imgWidthInput.disabled = false;
                    imgHeightInput.disabled = false;
                }
            }
            sizeModeSelect.addEventListener('change', updateSizeModeUI);
            updateSizeModeUI();

            // 加载图片
            function loadImagesFromFiles(files) {
                imageFiles = Array.from(files);
                const promises = imageFiles.map(file => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => resolve(img);
                        img.onerror = () => resolve(null);
                        img.src = URL.createObjectURL(file);
                    });
                });
                Promise.all(promises).then(loaded => {
                    images = loaded.filter(img => img !== null);
                    updateImageCountAndThumbs();
                    recalculateAndRender();
                });
            }

            function updateImageCountAndThumbs() {
                imageCountSpan.innerHTML = `📸 已选 ${images.length} 张图片`;
                let html = '';
                imageFiles.slice(0, 30).forEach((file, i) => {
                    const url = URL.createObjectURL(file);
                    html += `<img src="${url}" class="thumb-item" title="${file.name}">`;
                });
                thumbList.innerHTML = html;
            }

            // 核心排版计算 (返回layoutCache)
            function computeLayout() {
                if (images.length === 0) {
                    layoutCache = [];
                    totalPages = 0;
                    return;
                }
                const paperW = parseFloat(paperWidthInput.value) || 210;
                const paperH = parseFloat(paperHeightInput.value) || 297;
                const margin = parseFloat(marginInput.value) || 0;
                const rows = parseInt(rowsInput.value) || 3;
                const cols = parseInt(colsInput.value) || 3;
                const spacing = parseFloat(spacingInput.value) || 0;
                const rotation = parseFloat(rotationInput.value) || 0;
                const autoFill = autoFillCheck.checked;

                const perPage = rows * cols;
                totalPages = Math.ceil(images.length / perPage);
                const pages = [];

                const availableW = paperW - 2 * margin;
                const availableH = paperH - 2 * margin;

                for (let p = 0; p < totalPages; p++) {
                    const startIdx = p * perPage;
                    const endIdx = Math.min(startIdx + perPage, images.length);
                    const pageImages = images.slice(startIdx, endIdx);
                    const items = [];

                    if (autoFill) {
                        // 自动铺满：计算单元格尺寸
                        const cellW = (availableW - (cols - 1) * spacing) / cols;
                        const cellH = (availableH - (rows - 1) * spacing) / rows;

                        pageImages.forEach((img, idx) => {
                            const row = Math.floor(idx / cols);
                            const col = idx % cols;
                            const baseX = margin + col * (cellW + spacing);
                            const baseY = margin + row * (cellH + spacing);

                            // 图片等比缩放适应单元格 (contain)
                            const imgRatio = img.width / img.height;
                            let drawW, drawH;
                            if (imgRatio > cellW / cellH) {
                                drawW = cellW;
                                drawH = cellW / imgRatio;
                            } else {
                                drawH = cellH;
                                drawW = cellH * imgRatio;
                            }
                            const offsetX = (cellW - drawW) / 2;
                            const offsetY = (cellH - drawH) / 2;

                            items.push({
                                img,
                                x: baseX + offsetX,
                                y: baseY + offsetY,
                                w: drawW,
                                h: drawH,
                                rotation
                            });
                        });
                    } else {
                        // 手动尺寸模式
                        const mode = sizeModeSelect.value;
                        let baseW = parseFloat(imgWidthInput.value) || 60;
                        let baseH = parseFloat(imgHeightInput.value) || 60;

                        pageImages.forEach((img, idx) => {
                            const row = Math.floor(idx / cols);
                            const col = idx % cols;
                            // 计算位置 (按给定尺寸)
                            let drawW = baseW, drawH = baseH;
                            const imgRatio = img.width / img.height;

                            if (mode === 'width') {
                                drawW = baseW;
                                drawH = baseW / imgRatio;
                            } else if (mode === 'height') {
                                drawH = baseH;
                                drawW = baseH * imgRatio;
                            } else { // custom
                                if (lockRatioCheck.checked) {
                                    // 保持比例, 以宽度为准调整高度? 我们默认用宽度锁定
                                    drawW = baseW;
                                    drawH = baseW / imgRatio;
                                } else {
                                    drawW = baseW;
                                    drawH = baseH;
                                }
                            }

                            const x = margin + col * (drawW + spacing);
                            const y = margin + row * (drawH + spacing);
                            items.push({ img, x, y, w: drawW, h: drawH, rotation });
                        });
                    }
                    pages.push({ items });
                }
                layoutCache = pages;
            }

            // 绘制当前页
            function drawPage(pageIndex) {
                if (!layoutCache.length || pageIndex >= layoutCache.length) return;
                const paperW = parseFloat(paperWidthInput.value) || 210;
                const paperH = parseFloat(paperHeightInput.value) || 297;
                const canvasW = mmToPx(paperW);
                const canvasH = mmToPx(paperH);

                canvas.width = canvasW;
                canvas.height = canvasH;

                ctx.clearRect(0, 0, canvasW, canvasH);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvasW, canvasH);

                const page = layoutCache[pageIndex];

                page.items.forEach(item => {
                    const { img, x, y, w, h, rotation } = item;
                    const px = mmToPx(x);
                    const py = mmToPx(y);
                    const pw = mmToPx(w);
                    const ph = mmToPx(h);

                    ctx.save();
                    // 移动到图片中心旋转
                    const centerX = px + pw / 2;
                    const centerY = py + ph / 2;
                    ctx.translate(centerX, centerY);
                    if (rotation) ctx.rotate(rotation * Math.PI / 180);
                    ctx.translate(-centerX, -centerY);

                    ctx.drawImage(img, px, py, pw, ph);
                    ctx.restore();
                });

                // 绘制页边距参考线 (浅灰虚线)
                const marginVal = parseFloat(marginInput.value) || 0;
                if (marginVal > 0) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#a0b8cc';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(mmToPx(marginVal), mmToPx(marginVal), mmToPx(paperW - 2 * marginVal), mmToPx(paperH - 2 * marginVal));
                    ctx.setLineDash([]);
                }

                updatePaginationUI();
            }

            function updatePaginationUI() {
                currentPageLabel.textContent = currentPage + 1;
                totalPagesLabel.textContent = totalPages;
                pageInfoSpan.textContent = `第 ${currentPage + 1} / ${totalPages} 页`;
            }

            function recalculateAndRender() {
                computeLayout();
                if (totalPages === 0) {
                    canvas.width = 400; canvas.height = 300;
                    ctx.clearRect(0, 0, 400, 300);
                    return;
                }
                if (currentPage >= totalPages) currentPage = totalPages - 1;
                if (currentPage < 0) currentPage = 0;
                drawPage(currentPage);
            }

            // 事件绑定
            uploadArea.addEventListener('click', () => fileInput.click());
            uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#2563eb'; });
            uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#b9c8dd'; });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#b9c8dd';
                const files = e.dataTransfer.files;
                if (files.length) loadImagesFromFiles(files);
            });
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) loadImagesFromFiles(e.target.files);
            });

            refreshBtn.addEventListener('click', recalculateAndRender);

            // 监听所有设置变化自动刷新 (简化)
            const inputs = [paperWidthInput, paperHeightInput, marginInput, rowsInput, colsInput, spacingInput,
                autoFillCheck, sizeModeSelect, imgWidthInput, imgHeightInput, lockRatioCheck, rotationInput];
            inputs.forEach(inp => inp.addEventListener('change', recalculateAndRender));
            inputs.forEach(inp => inp.addEventListener('input', () => { if (inp.type !== 'checkbox') recalculateAndRender; }));
            autoFillCheck.addEventListener('change', recalculateAndRender);
            lockRatioCheck.addEventListener('change', recalculateAndRender);

            prevPageBtn.addEventListener('click', () => {
                if (currentPage > 0) { currentPage--; drawPage(currentPage); }
            });
            nextPageBtn.addEventListener('click', () => {
                if (currentPage < totalPages - 1) { currentPage++; drawPage(currentPage); }
            });

            // 导出PDF
            exportPdfBtn.addEventListener('click', async () => {
                if (!layoutCache.length) { alert('没有图片可导出'); return; }
                const { jsPDF } = window.jspdf;
                const paperW = parseFloat(paperWidthInput.value) || 210;
                const paperH = parseFloat(paperHeightInput.value) || 297;
                const orientation = paperW > paperH ? 'l' : 'p';
                const pdf = new jsPDF({ unit: 'mm', format: [paperW, paperH], orientation });

                for (let i = 0; i < totalPages; i++) {
                    if (i > 0) pdf.addPage([paperW, paperH], orientation);
                    // 绘制当前页到临时canvas (直接复用现有canvas, 但需重绘)
                    currentPage = i;
                    drawPage(i);
                    const imgData = canvas.toDataURL('image/png');
                    pdf.addImage(imgData, 'PNG', 0, 0, paperW, paperH);
                }
                pdf.save(`排版_${totalPages}页.pdf`);
                // 恢复当前页
                if (currentPage !== 0) drawPage(currentPage);
            });

            // 初始化一些默认
            updatePaperPreset();
            // 示例加载提示 (可选)
            recalculateAndRender();

            // 添加重置比例辅助
            window.addEventListener('load', () => {
                // 无图时占位
            });
        })();
    </script>
</body>

</html>
