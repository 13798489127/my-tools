<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📊 Excel 工作表拆分工具 · 按多列组合</title>
    <!-- 清新样式 + 基础交互 -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f4f7fc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 20, 50, 0.08);
            padding: 28px 30px;
            transition: all 0.2s;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1e2f4e;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            background: #e9ecf2;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 30px;
            margin-left: 12px;
        }

        .subtitle {
            color: #4a5b6e;
            margin-bottom: 24px;
            border-left: 5px solid #3b82f6;
            padding-left: 18px;
            font-weight: 400;
            font-size: 1rem;
        }

        .upload-area {
            background: #f9faff;
            border: 2px dashed #b7c9e2;
            border-radius: 20px;
            padding: 22px 25px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .file-label {
            background: #1e3a5f;
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(0, 35, 70, 0.1);
            border: none;
            font-size: 0.95rem;
        }

        .file-label:hover {
            background: #143048;
            transform: translateY(-1px);
        }

        #file-info {
            color: #1e3a5f;
            font-weight: 500;
            margin-left: 15px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 22px 25px;
            margin: 20px 0 18px;
        }

        .param-box {
            background: #fafcff;
            border-radius: 18px;
            padding: 16px 20px;
            border: 1px solid #e2e9f2;
        }

        .param-label {
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .param-label i {
            font-size: 1.2rem;
        }

        input,
        select,
        button {
            border-radius: 14px;
        }

        .region-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .region-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #d7e0e9;
            background: white;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .region-input button {
            background: #eef3fa;
            border: 1.5px solid #d0ddee;
            padding: 10px 18px;
            font-weight: 500;
            color: #1e3a5f;
            cursor: pointer;
            transition: 0.1s;
        }

        .region-input button:hover {
            background: #dee8f3;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            margin-top: 12px;
        }

        .checkbox-item input {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            accent-color: #2563eb;
        }

        .split-cols-container {
            margin-top: 12px;
        }

        .multi-select {
            width: 100%;
            padding: 10px;
            border: 1.5px solid #d7e0e9;
            border-radius: 16px;
            background: white;
            font-size: 0.9rem;
        }

        .hint {
            font-size: 0.8rem;
            color: #5f7d9c;
            margin-top: 5px;
        }

        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 12px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 450;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin: 20px 0 25px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 32px;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 60px;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #2563eb;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: scale(1.01);
        }

        .btn-secondary {
            background: white;
            border: 1.5px solid #b9c8dd;
            color: #1e3a5f;
            padding: 10px 22px;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
        }

        .preview-container {
            background: #f9fcff;
            border-radius: 20px;
            padding: 10px 5px 5px 5px;
            border: 1px solid #dfe8f2;
            margin-top: 20px;
            overflow-x: auto;
        }

        .preview-title {
            font-weight: 600;
            padding: 0 10px 10px;
            color: #1e3a5f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: white;
            border-radius: 16px;
        }

        th,
        td {
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background: #eef3fc;
            color: #1e3a5f;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .status-msg {
            margin-left: auto;
            color: #2563eb;
            font-weight: 500;
        }

        .footer-note {
            margin-top: 15px;
            color: #62778b;
            font-size: 0.85rem;
            text-align: right;
        }

        .sheet-selector {
            margin: 8px 0 0;
        }
    </style>
    <!-- 核心库 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>
    <div class="card">
        <h1>✂️ 工作表拆分工具
            <small>按多列组合 · 灵活输出</small>
        </h1>
        <div class="subtitle">上传Excel → 选择区域/标题 → 勾选拆分依据列 → 一键拆分</div>

        <!-- 上传区 -->
        <div class="upload-area">
            <div style="display: flex; align-items: center;">
                <label class="file-label" for="file-input">📁 选择 Excel 文件</label>
                <input type="file" id="file-input" accept=".xlsx, .xls, .csv" style="display:none;">
                <span id="file-info">未选择文件</span>
            </div>
            <div style="display: flex; gap: 8px;">
                <span style="color:#4b6589;">📋 当前工作表：</span>
                <select id="sheet-select"
                    style="padding:6px 20px 6px 12px; border-radius:30px; border:1px solid #ccd9e9; background:white; min-width:140px;"
                    disabled>
                    <option>— 请先上传 —</option>
                </select>
            </div>
        </div>

        <!-- 配置区 -->
        <div class="config-grid">
            <div class="param-box">
                <div class="param-label"><span>🔲 待拆分区域</span></div>
                <div class="region-input">
                    <input type="text" id="range-input" placeholder="例如: A1:F500 或留空自动" value="" spellcheck="false">
                    <button id="auto-range-btn" type="button">📐 自动检测</button>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="header-checkbox" checked>
                    <label for="header-checkbox"><strong>包含标题行</strong> (第一行为列标题)</label>
                </div>
                <div style="margin-top: 14px;">
                    <button id="load-columns-btn" class="btn-secondary" style="width:100%;">🔄 刷新拆分依据列</button>
                </div>
            </div>
            <div class="param-box">
                <div class="param-label"><span>🎯 拆分依据 (可多选)</span></div>
                <div class="split-cols-container">
                    <select id="split-cols-select" class="multi-select" multiple size="5" style="min-height:120px;">
                        <option disabled>请先加载列选项</option>
                    </select>
                    <div class="hint">按住 Ctrl / ⌘ 可多选。依据这些列的组合值拆分。</div>
                </div>
                <div style="margin-top: 18px;">
                    <div class="param-label" style="margin-bottom:6px;">📦 生成文件方式</div>
                    <div class="radio-group">
                        <label><input type="radio" name="output-mode" value="single" checked> 📄 单文件多表
                            (一个Excel含多个sheet)</label>
                        <label><input type="radio" name="output-mode" value="multi"> 🗂️ 多文件单表 (打包为ZIP)</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar">
            <button id="split-btn" class="btn-primary">✨ 执行拆分并下载</button>
            <span id="status-text" class="status-msg"></span>
            <button id="preview-btn" class="btn-secondary" style="margin-left:auto;">👀 预览当前数据</button>
        </div>

        <!-- 预览表格区域 -->
        <div class="preview-container">
            <div class="preview-title">📋 数据预览 (前10行) </div>
            <div style="max-height: 280px; overflow: auto; border-radius: 14px;">
                <table id="preview-table">
                    <thead>
                        <tr>
                            <th>等待加载数据…</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="footer-note">
            * 拆分依据列请先“刷新列选项”。单文件多表sheet名称为组合键，多文件打包为ZIP。
        </div>
    </div>

    <script>
        (function () {
            "use strict";

            // ---------- 全局状态 ----------
            let wb = null;                     // 当前workbook
            let currentSheetName = '';         // 当前选中sheet名
            let currentSheet = null;           // 当前sheet对象
            let cachedDataMatrix = null;       // 基于区域解析的二维数组 [[...]]
            let columnOptions = [];            // 列选项 { value: 'col标识', label: '显示名', index: 列索引 }

            // DOM 元素
            const fileInput = document.getElementById('file-input');
            const fileInfo = document.getElementById('file-info');
            const sheetSelect = document.getElementById('sheet-select');
            const rangeInput = document.getElementById('range-input');
            const headerCheck = document.getElementById('header-checkbox');
            const splitColsSelect = document.getElementById('split-cols-select');
            const loadColsBtn = document.getElementById('load-columns-btn');
            const autoRangeBtn = document.getElementById('auto-range-btn');
            const previewBtn = document.getElementById('preview-btn');
            const splitBtn = document.getElementById('split-btn');
            const statusText = document.getElementById('status-text');
            const previewTable = document.getElementById('preview-table');
            const outputRadios = document.getElementsByName('output-mode');

            // ---------- 辅助函数：显示简短状态 ----------
            function setStatus(msg, isError = false) {
                statusText.textContent = msg;
                statusText.style.color = isError ? '#b91c1c' : '#2563eb';
            }

            // ---------- 解析区域字符串 (支持 "A1:D100") 返回range对象 或 null ----------
            function parseRangeString(rangeStr, sheet) {
                if (!sheet) return null;
                try {
                    // 如果输入带sheet名，比如 Sheet1!A1:B10, 移除sheet部分
                    let pureRange = rangeStr.includes('!') ? rangeStr.split('!')[1] : rangeStr;
                    return XLSX.utils.decode_range(pureRange);
                } catch (e) {
                    return null;
                }
            }

            // ---------- 获取当前工作表默认区域 (有数据的范围) ----------
            function getDefaultRange(sheet) {
                if (!sheet || !sheet['!ref']) return 'A1';
                return sheet['!ref'];
            }

            // ---------- 根据区域和标题设置，从sheet提取二维数组 ----------
            function extractDataMatrix(sheet, rangeStr, hasHeader) {
                if (!sheet) return [];
                let range;
                if (rangeStr && rangeStr.trim() !== '') {
                    range = parseRangeString(rangeStr, sheet);
                    if (!range) {
                        // 如果解析失败，尝试用默认
                        console.warn('区域解析失败，使用默认区域');
                        range = parseRangeString(getDefaultRange(sheet), sheet);
                    }
                } else {
                    range = parseRangeString(getDefaultRange(sheet), sheet);
                }
                if (!range) return [];

                // 用 sheet_to_json 但 header:1 得到二维数组 (包含所有行)
                const options = { header: 1, range: range };
                const matrix = XLSX.utils.sheet_to_json(sheet, options);
                return matrix;
            }

            // ---------- 刷新预览表格 (前10行) ----------
            function renderPreview(matrix, hasHeader) {
                if (!matrix || matrix.length === 0) {
                    previewTable.innerHTML = '<thead><tr><th>暂无数据</th></tr></thead><tbody></tbody>';
                    return;
                }
                const maxRows = Math.min(10, matrix.length);
                const displayRows = matrix.slice(0, maxRows);

                let html = '<thead><tr>';
                // 列头：显示列索引或标题内容
                if (hasHeader && displayRows.length > 0) {
                    const headerRow = displayRows[0];
                    for (let i = 0; i < headerRow.length; i++) {
                        html += `<th>${headerRow[i] !== undefined && headerRow[i] !== null ? String(headerRow[i]).substring(0, 20) : `列${i + 1}`}</th>`;
                    }
                } else {
                    const colCount = displayRows[0]?.length || 0;
                    for (let i = 0; i < colCount; i++) {
                        html += `<th>列 ${XLSX.utils.encode_col(i)}</th>`;
                    }
                }
                html += '</tr></thead><tbody>';

                const startRow = hasHeader ? 1 : 0;
                for (let r = startRow; r < maxRows; r++) {
                    const row = displayRows[r];
                    html += '<tr>';
                    if (row) {
                        for (let c = 0; c < row.length; c++) {
                            const val = row[c];
                            html += `<td>${val !== undefined && val !== null ? String(val).substring(0, 30) : ''}</td>`;
                        }
                    }
                    html += '</tr>';
                }
                html += '</tbody>';
                previewTable.innerHTML = html;
            }

            // ---------- 刷新列选项 (依据当前区域 + 是否标题) ----------
            function refreshColumnOptions() {
                if (!currentSheet) {
                    setStatus('请先上传并选择工作表', true);
                    return;
                }
                const rangeStr = rangeInput.value.trim();
                const hasHeader = headerCheck.checked;

                // 提取矩阵
                const matrix = extractDataMatrix(currentSheet, rangeStr, hasHeader);
                cachedDataMatrix = matrix;
                if (!matrix || matrix.length === 0) {
                    setStatus('所选区域无数据', true);
                    splitColsSelect.innerHTML = '<option disabled>无可用列</option>';
                    columnOptions = [];
                    renderPreview([], hasHeader);
                    return;
                }

                // 确定列数
                const colCount = matrix[0]?.length || 0;
                if (colCount === 0) {
                    setStatus('区域没有列', true);
                    return;
                }

                // 构建列选项
                const options = [];
                if (hasHeader) {
                    const headerRow = matrix[0];
                    for (let i = 0; i < colCount; i++) {
                        const raw = headerRow[i];
                        let label = (raw !== undefined && raw !== null) ? String(raw).trim() : `列${XLSX.utils.encode_col(i)}`;
                        if (label === '') label = `列${XLSX.utils.encode_col(i)}`;
                        options.push({
                            value: `col_${i}`,
                            label: `${label} (${XLSX.utils.encode_col(i)})`,
                            index: i,
                            headerName: label
                        });
                    }
                } else {
                    for (let i = 0; i < colCount; i++) {
                        const colLetter = XLSX.utils.encode_col(i);
                        options.push({
                            value: `col_${i}`,
                            label: `列 ${colLetter}`,
                            index: i,
                            headerName: `列${colLetter}`
                        });
                    }
                }

                columnOptions = options;

                // 填充select
                let selectHtml = '';
                options.forEach(opt => {
                    selectHtml += `<option value="${opt.value}" data-index="${opt.index}">${opt.label}</option>`;
                });
                splitColsSelect.innerHTML = selectHtml;

                // 预览
                renderPreview(matrix, hasHeader);
                setStatus(`已加载 ${matrix.length} 行, ${colCount} 列`);
            }

            // ---------- 加载工作簿并初始化 ----------
            function loadWorkbook(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        wb = XLSX.read(data, { type: 'array' });
                        const sheetNames = wb.SheetNames;
                        if (sheetNames.length === 0) throw new Error('工作簿无sheet');

                        // 填充下拉
                        sheetSelect.innerHTML = '';
                        sheetNames.forEach(name => {
                            const opt = document.createElement('option');
                            opt.value = name;
                            opt.textContent = name;
                            sheetSelect.appendChild(opt);
                        });
                        sheetSelect.disabled = false;
                        currentSheetName = sheetNames[0];
                        sheetSelect.value = currentSheetName;
                        currentSheet = wb.Sheets[currentSheetName];

                        // 自动设置区域为默认区域
                        const defaultRef = getDefaultRange(currentSheet);
                        rangeInput.value = defaultRef || '';

                        fileInfo.textContent = `✅ ${file.name} (${sheetNames.length} 个表)`;

                        // 刷新列选项和预览
                        refreshColumnOptions();
                        setStatus('文件加载成功，可调整区域/标题后刷新列');
                    } catch (err) {
                        setStatus('解析失败: ' + err.message, true);
                    }
                };
                reader.readAsArrayBuffer(file);
            }

            // ---------- 事件绑定 ----------
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                loadWorkbook(file);
            });

            // 切换工作表
            sheetSelect.addEventListener('change', () => {
                if (!wb) return;
                const selName = sheetSelect.value;
                if (selName) {
                    currentSheetName = selName;
                    currentSheet = wb.Sheets[selName];
                    rangeInput.value = getDefaultRange(currentSheet) || '';
                    refreshColumnOptions();
                }
            });

            // 自动检测区域
            autoRangeBtn.addEventListener('click', () => {
                if (!currentSheet) { setStatus('请先上传文件', true); return; }
                rangeInput.value = getDefaultRange(currentSheet) || '';
                refreshColumnOptions();
            });

            // 加载/刷新列
            loadColsBtn.addEventListener('click', refreshColumnOptions);

            // 预览按钮
            previewBtn.addEventListener('click', () => {
                if (!currentSheet) { setStatus('无数据', true); return; }
                const rangeStr = rangeInput.value.trim();
                const hasHeader = headerCheck.checked;
                const matrix = extractDataMatrix(currentSheet, rangeStr, hasHeader);
                renderPreview(matrix, hasHeader);
                setStatus('预览更新');
            });

            // ---------- 拆分核心逻辑 ----------
            async function performSplit() {
                if (!wb || !currentSheet) {
                    setStatus('请先上传Excel', true); return;
                }
                const selectedOptions = Array.from(splitColsSelect.selectedOptions);
                if (selectedOptions.length === 0) {
                    setStatus('请至少选择一列作为拆分依据', true); return;
                }

                const splitIndices = selectedOptions.map(opt => parseInt(opt.dataset.index));
                const hasHeader = headerCheck.checked;
                const rangeStr = rangeInput.value.trim();

                // 获取最新矩阵
                const matrix = extractDataMatrix(currentSheet, rangeStr, hasHeader);
                if (!matrix || matrix.length === 0) {
                    setStatus('数据区域为空', true); return;
                }

                const headerRow = hasHeader ? matrix[0] : null;
                const dataRows = hasHeader ? matrix.slice(1) : matrix;

                if (dataRows.length === 0) {
                    setStatus('没有数据行可拆分', true); return;
                }

                // 构建分组 Map: key -> 行数组 (不包含标题行)
                const groupMap = new Map();

                dataRows.forEach(row => {
                    // 生成组合键
                    const keyParts = splitIndices.map(idx => {
                        let val = row[idx];
                        return (val === undefined || val === null) ? '' : String(val);
                    });
                    const key = keyParts.join('|||');  // 分隔符

                    if (!groupMap.has(key)) {
                        groupMap.set(key, []);
                    }
                    groupMap.get(key).push(row);
                });

                const groupCount = groupMap.size;
                if (groupCount === 0) {
                    setStatus('没有可分组的数据', true); return;
                }

                const outputMode = Array.from(outputRadios).find(r => r.checked)?.value || 'single';

                setStatus(`正在生成 ${groupCount} 个分组…`);

                try {
                    if (outputMode === 'single') {
                        // 单文件多表
                        const newWb = XLSX.utils.book_new();

                        for (let [key, rows] of groupMap.entries()) {
                            // 构造sheet数据: 如果有标题行，则添加标题
                            const sheetData = hasHeader ? [headerRow, ...rows] : rows;
                            const ws = XLSX.utils.aoa_to_sheet(sheetData);

                            // sheet名称: 用组合键生成，限制31字符，去除非法字符
                            let sheetName = key.split('|||').map(s => s.substring(0, 10)).join('_');
                            sheetName = sheetName.replace(/[:\\\/\?\*\[\]]/g, '_').substring(0, 31);
                            if (sheetName === '') sheetName = '分组';
                            // 避免重名
                            let finalName = sheetName;
                            let counter = 1;
                            while (newWb.SheetNames.includes(finalName)) {
                                finalName = sheetName.substring(0, 28) + '_' + counter;
                                counter++;
                            }
                            XLSX.utils.book_append_sheet(newWb, ws, finalName);
                        }

                        const wbout = XLSX.write(newWb, { bookType: 'xlsx', type: 'binary' });
                        const buf = new ArrayBuffer(wbout.length);
                        const view = new Uint8Array(buf);
                        for (let i = 0; i < wbout.length; i++) view[i] = wbout.charCodeAt(i) & 0xFF;
                        saveAs(new Blob([buf], { type: 'application/octet-stream' }), `拆分结果_${currentSheetName}_${groupCount}组.xlsx`);
                        setStatus(`✅ 单文件已生成，包含 ${groupCount} 个工作表`);
                    } else {
                        // 多文件单表 -> 打包zip
                        const zip = new JSZip();
                        const folder = zip.folder("拆分文件");

                        for (let [key, rows] of groupMap.entries()) {
                            const sheetData = hasHeader ? [headerRow, ...rows] : rows;
                            const ws = XLSX.utils.aoa_to_sheet(sheetData);
                            const newWb = XLSX.utils.book_new();
                            XLSX.utils.book_append_sheet(newWb, ws, "Sheet1");

                            const wbout = XLSX.write(newWb, { bookType: 'xlsx', type: 'binary' });
                            const buf = new ArrayBuffer(wbout.length);
                            const view = new Uint8Array(buf);
                            for (let i = 0; i < wbout.length; i++) view[i] = wbout.charCodeAt(i) & 0xFF;

                            // 文件名
                            let fileNameKey = key.split('|||').map(s => s.replace(/[\\/:*?"<>|]/g, '_').substring(0, 15)).join('_');
                            if (!fileNameKey) fileNameKey = 'group';
                            const fileName = `${fileNameKey}.xlsx`;
                            folder.file(fileName, new Blob([buf], { type: 'application/octet-stream' }));
                        }

                        const content = await zip.generateAsync({ type: 'blob' });
                        saveAs(content, `拆分文件包_${groupCount}个文件.zip`);
                        setStatus(`✅ ZIP打包完成，包含 ${groupCount} 个Excel文件`);
                    }
                } catch (e) {
                    setStatus('拆分出错: ' + e.message, true);
                }
            }

            splitBtn.addEventListener('click', performSplit);

            // 拖拽上传效果（可选）
            const uploadArea = document.querySelector('.upload-area');
            uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#2563eb'; });
            uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#b7c9e2'; });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#b7c9e2';
                const file = e.dataTransfer.files[0];
                if (file) {
                    fileInput.files = e.dataTransfer.files; // 同步
                    loadWorkbook(file);
                }
            });
            // 点击label触发
            document.querySelector('.file-label').addEventListener('click', () => fileInput.click());

            // 初始化一些提示
            setStatus('请上传Excel文件开始');
        })();
    </script>
</body>

</html>
